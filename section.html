<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Section Detail - Prompt Drift Observatory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="section-detail">
    <div class="backdrop"></div>
    <main class="shell">
      <header id="site-nav" class="site-nav"></header>

      <section class="hero hero-small">
        <div class="eyebrow">Page 3</div>
        <h1 id="section-title">Section detail</h1>
        <p id="section-lede" class="lede">
          Current state, section summary, and the key evidence for how this part
          of the prompt changed.
        </p>
      </section>

      <section class="panel panel-grid">
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Browse sections</div>
              <h2>Catalog</h2>
            </div>
          </div>
          <div id="section-catalog" class="stack-list"></div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Current reading</div>
              <h2>Snapshot</h2>
            </div>
          </div>
          <div id="section-summary" class="info-grid"></div>
        </div>
      </section>

      <section class="panel panel-grid">
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Present text</div>
              <h2>Current units</h2>
            </div>
          </div>
          <div id="section-units" class="stack-list"></div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Timeline</div>
              <h2>Historical evidence</h2>
            </div>
          </div>
          <div id="section-history" class="stack-list"></div>
        </div>
      </section>

      <section id="status" class="status">Loading analysis...</section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
