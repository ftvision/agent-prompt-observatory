<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Method - Prompt Drift Observatory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="method">
    <div class="backdrop"></div>
    <main class="shell">
      <header id="site-nav" class="site-nav"></header>

      <section class="hero hero-small">
        <div class="eyebrow">Page 7</div>
        <h1>Method</h1>
        <p class="lede">
          How this prototype parses prompt history, what it can currently
          measure, and where semantic lineage needs stronger support.
        </p>
      </section>

      <section class="panel panel-grid">
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Process</div>
              <h2>Pipeline</h2>
            </div>
          </div>
          <div id="method-pipeline" class="stack-list"></div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Live facts</div>
              <h2>Current dataset</h2>
            </div>
          </div>
          <div id="method-facts" class="info-grid"></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <div class="kicker">Constraints</div>
            <h2>Known limitations</h2>
          </div>
        </div>
        <div id="method-limitations" class="card-grid compact-grid"></div>
      </section>

      <section id="status" class="status">Loading analysis...</section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
