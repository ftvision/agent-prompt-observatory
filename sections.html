<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sections - Prompt Drift Observatory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="sections">
    <div class="backdrop"></div>
    <main class="shell">
      <header id="site-nav" class="site-nav"></header>

      <section class="hero hero-small">
        <div class="eyebrow">Page 2</div>
        <h1>Sections</h1>
        <p class="lede">
          The current prompt broken into major sections, ranked by persistence,
          volatility, and current density.
        </p>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <div class="kicker">Current structure</div>
            <h2>Section index</h2>
          </div>
          <div id="sections-note" class="inline-note"></div>
        </div>
        <div id="section-index" class="card-grid"></div>
      </section>

      <section id="status" class="status">Loading analysis...</section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
