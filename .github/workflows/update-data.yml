name: Refresh Observatory Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Fetch new captures from cchistory.mariozechner.at
        run: uv run python scripts/fetch_versions.py

      - name: Re-export structured data for the UI
        run: |
          cd claude-code-analyzer
          uv sync
          uv run cca export ../data/raw --output-dir ../ui/public/data

      - name: Detect changes
        id: check
        run: |
          if git diff --quiet data/ ui/public/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        # Push triggers deploy.yml, which builds and publishes to GitHub Pages.
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ ui/public/data/
          git commit -m "Refresh observatory data ($(date -u +%Y-%m-%d))"
          git push
