name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'ui/**'
      - '.github/workflows/deploy.yml'
  # Daily data refreshes commit via the bot's GITHUB_TOKEN, and per GitHub's
  # anti-loop policy a GITHUB_TOKEN push does NOT trigger other workflows.
  # workflow_run is its own event that bypasses that rule, so deploy fires
  # whenever Refresh Observatory Data finishes a successful run on master.
  workflow_run:
    workflows: [Refresh Observatory Data]
    types: [completed]
    branches: [master]
  workflow_dispatch:

# One concurrent deployment; cancel in-flight runs if a newer push comes in.
concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip deploy when the upstream refresh finished but didn't succeed.
    # No-op for push / workflow_dispatch events.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Build
        run: npm run build
        working-directory: ui

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
