<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compare Versions - Prompt Drift Observatory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="compare">
    <div class="backdrop"></div>
    <main class="shell">
      <header id="site-nav" class="site-nav"></header>

      <section class="hero hero-small">
        <div class="eyebrow">Page 6</div>
        <h1>Compare Versions</h1>
        <p class="lede">
          Pick two versions in the latest window and inspect structural drift,
          shared-section churn, and example evidence.
        </p>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <div class="kicker">Direct evidence</div>
            <h2>Comparison</h2>
          </div>
          <div id="compare-note" class="inline-note"></div>
        </div>
        <div class="toolbar-row">
          <div id="compare-controls" class="toolbar-row"></div>
        </div>
        <div id="compare-summary" class="info-grid"></div>
        <div id="compare-detail" class="detail-grid"></div>
      </section>

      <section id="status" class="status">Loading analysis...</section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
