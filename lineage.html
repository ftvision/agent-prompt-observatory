<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lineage Detail - Prompt Drift Observatory</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="lineage-detail">
    <div class="backdrop"></div>
    <main class="shell">
      <header id="site-nav" class="site-nav"></header>

      <section class="hero hero-small">
        <div class="eyebrow">Page 5</div>
        <h1 id="lineage-title">Lineage detail</h1>
        <p id="lineage-lede" class="lede">
          One major idea traced through the prompt with current state, related
          sections, and version-by-version evidence.
        </p>
      </section>

      <section class="panel panel-grid">
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Browse lineages</div>
              <h2>Catalog</h2>
            </div>
          </div>
          <div id="lineage-catalog" class="stack-list"></div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Current reading</div>
              <h2>Profile</h2>
            </div>
          </div>
          <div id="lineage-profile" class="info-grid"></div>
        </div>
      </section>

      <section class="panel panel-grid">
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Current evidence</div>
              <h2>Active sections</h2>
            </div>
          </div>
          <div id="lineage-sections" class="stack-list"></div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="kicker">Change trail</div>
              <h2>Transitions</h2>
            </div>
          </div>
          <div id="lineage-history" class="stack-list"></div>
        </div>
      </section>

      <section id="status" class="status">Loading analysis...</section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
