<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Claude Code Prompt Observatory</title>
  <!-- Resolve the theme before first paint to avoid a light/dark flash.
       Stored choice wins; otherwise follow the OS preference. -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('theme')
        var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.dataset.theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (dark ? 'dark' : 'light')
      } catch (e) {
        document.documentElement.dataset.theme = 'light'
      }
    })()
  </script>
  <!-- Critical-path data: start fetching in parallel with the JS bundle so
       Structure has its bytes ready when the module finishes evaluating. -->
  <link rel="preload" as="fetch" href="/data/meta.json">
  <link rel="preload" as="fetch" href="/data/latest.json">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
